<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LerLarChat | Immersive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="mobile-frame">
        <header class="hud-top">
            <div class="user-profile">
                <div class="avatar"></div>
                <span id="username-display">Moi</span>
            </div>
            <div class="streak-badge">
                <span class="fire-icon">🔥</span>
                <span id="streak-count">12</span>
            </div>
        </header>

        <main id="immersive-chat">
            <div class="chat-feed" id="feed">
                <div class="msg-pill received">
                    <span class="sender">LerLarBot</span>
                    <p>Swipe pour voir la magie ! ✨</p>
                </div>
            </div>
        </main>

        <footer class="hud-bottom">
            <div class="composer-pill">
                <button id="camera-btn">📸</button>
                <input type="text" id="msg-input" placeholder="Envoyer un chat..." autocomplete="off">
                <button id="send-trigger">🚀</button>
            </div>
        </footer>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
