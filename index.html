<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LarLerChat | Messaging</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="status-dot"></div>
            <h1>LarLerCaht</h1>
            <button id="theme-toggle">🌓</button>
        </header>

        <main id="chat-window">
            <div class="date-separator">Aujourd'hui</div>
            <div class="bubble received">
                <span class="sender">LarLerBot</span>
                <p>Bienvenue ! Ici, pas de serveurs compliqués, juste du code pur.</p>
            </div>
        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Écris ici...">
                <button id="send-btn">🚀</button>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
