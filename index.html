<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LerLarChat | Social Immersive</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="mobile-frame">
        <div id="auth-overlay">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button id="tab-login" class="active" onclick="showAuth('login')">Connexion</button>
                    <button id="tab-signup" onclick="showAuth('signup')">Inscription</button>
                </div>

                <div id="login-form" class="auth-view">
                    <h1>Bon retour !</h1>
                    <input type="email" id="login-email" placeholder="Email">
                    <input type="password" id="login-password" placeholder="Mot de passe">
                    <button class="btn-main" id="btn-login-email">Se connecter</button>
                </div>

                <div id="signup-form" class="auth-view hidden">
                    <h1>Créer un compte</h1>
                    <input type="text" id="signup-user" placeholder="Nom d'utilisateur">
                    <input type="email" id="signup-email" placeholder="Email">
                    <input type="password" id="signup-password" placeholder="Mot de passe">
                    <button class="btn-main" id="btn-signup-email">S'inscrire</button>
                </div>

                <div class="divider"><span>OU</span></div>

                <button id="google-signin-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                    Continuer avec Google
                </button>
            </div>
        </div>

        <div id="app-content" class="hidden">
            <div id="stories-tray">
                <div class="story-add">+</div>
                <div id="stories-container"></div>
            </div>

            <header class="hud-top">
                <div class="user-profile">
                    <img id="user-avatar" class="avatar" src="" style="display:none">
                    <div id="avatar-placeholder" class="avatar"></div>
                    <span id="username-display">...</span>
                </div>
                <div class="streak-badge">🔥 <span id="streak-count">0</span></div>
            </header>

            <main id="main-view">
                <div id="feed" class="view-section active"></div>
                <div id="contacts-view" class="view-section hidden">
                    <h2 class="view-title">Communauté</h2>
                    <div id="users-list"></div>
                </div>
            </main>

            <nav class="nav-bar">
                <button class="nav-item active" onclick="switchTab('chat', this)">💬</button>
                <button class="nav-item" onclick="switchTab('contacts', this)">👥</button>
                <button class="nav-item" id="btn-logout">🚪</button>
            </nav>

            <footer class="hud-bottom" id="chat-controls">
                <div class="composer-pill">
                    <input type="text" id="msg-input" placeholder="Envoyer un message..." autocomplete="off">
                    <button id="send-trigger">🚀</button>
                </div>
            </footer>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
